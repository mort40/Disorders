<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1a1c29" />
      <stop offset="100%" stop-color="#0a0b10" />
    </radialGradient>
    
    <!-- Mood Gradients -->
    <!-- Depression: Desaturated fading slate -->
    <linearGradient id="depGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a5568" />
      <stop offset="100%" stop-color="#1a202c" />
    </linearGradient>
    
    <!-- Bipolar: Gold to Indigo -->
    <linearGradient id="biGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700" />
      <stop offset="50%" stop-color="#9f7aea" />
      <stop offset="100%" stop-color="#3182ce" />
    </linearGradient>
    
    <!-- Anxiety: Jittery Red-Orange -->
    <radialGradient id="anxGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fc8181" stop-opacity="1" />
      <stop offset="100%" stop-color="#e53e3e" stop-opacity="0" />
    </radialGradient>
    
    <!-- ADHD: Scattered neon glow -->
    <linearGradient id="adhdGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38b2ac" />
      <stop offset="50%" stop-color="#ed64a6" />
      <stop offset="100%" stop-color="#ecc94b" />
    </linearGradient>

    <!-- Brain Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- Outer Glow Ring -->
  <rect width="496" height="496" x="8" y="8" rx="104" fill="none" stroke="url(#biGrad)" stroke-width="3" opacity="0.3" />

  <!-- Center Group -->
  <g transform="translate(256, 256)">
    
    <!-- Brain Silhouette / Mindscape Concept -->
    <!-- We draw an abstract glowing profile of a head and brain -->
    
    <!-- 1. The Shadowed Head Profile -->
    <path d="M-100,140 C-100,100 -120,80 -120,20 C-120,-80 -60,-150 20,-150 C100,-150 140,-90 140,-10 C140,50 110,80 110,130 C110,140 100,160 80,160 L-80,160 Z" fill="#0f111a" stroke="#2d3748" stroke-width="4" filter="url(#glow)" />
    
    <!-- 2. Depression Symbolism: Heavy Cloud in Lower Brain -->
    <path d="M-80,40 C-80,20 -60,10 -40,10 C-30,10 -20,15 -15,22 C-10,15 0,10 10,10 C30,10 45,25 45,45 C45,50 40,75 -20,75 C-60,75 -80,60 -80,40 Z" fill="url(#depGrad)" opacity="0.8" />
    
    <!-- 3. Anxiety Symbolism: Jittery Inner Spiral (Red) -->
    <path d="M0,-20 M0,-20 A20,20 0 1,0 20,0 A40,40 0 1,0 -40,0 A60,60 0 1,0 60,0 A80,80 0 0,0 -80,-30" fill="none" stroke="#f56565" stroke-width="5" stroke-linecap="round" opacity="0.85" filter="url(#glow)" />

    <!-- 4. Bipolar Symbolism: Moon and Sun Wave (Gold/Purple) -->
    <!-- Crescent Moon -->
    <path d="M-70,-60 A 35,35 0 0,0 -20,-30 A 25,25 0 0,1 -60,-55" fill="#ffd700" filter="url(#glow)" />
    <!-- Bright Wave -->
    <path d="M-20,-70 Q 10,-95 40,-70 T 100,-70" fill="none" stroke="#9f7aea" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />

    <!-- 5. ADHD Symbolism: Sparkles and Scattered Focus Dots (Teal/Pink/Yellow) -->
    <circle cx="50" cy="-30" r="7" fill="#38b2ac" filter="url(#glow)" />
    <circle cx="80" cy="-60" r="5" fill="#ed64a6" filter="url(#glow)" />
    <circle cx="-10" cy="-100" r="6" fill="#ecc94b" filter="url(#glow)" />
    <line x1="-30" y1="-80" x2="-20" y2="-90" stroke="#ecc94b" stroke-width="4" stroke-linecap="round" />
    <line x1="-20" y1="-80" x2="-30" y2="-90" stroke="#ecc94b" stroke-width="4" stroke-linecap="round" />
    
    <!-- Glowing Core Center -->
    <circle cx="0" cy="0" r="15" fill="#ffffff" filter="url(#glow)" opacity="0.9" />
  </g>
</svg>
